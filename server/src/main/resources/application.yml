server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/exam_review?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

jwt:
  secret: ${JWT_SECRET:exam-review-system-jwt-secret-key-2024}
  expiration: 86400000  # 24小时

deepseek:
  api-key: sk-e40c80a44b6b4ed1b18a135fe1de4135
  base-url: https://api.deepseek.com
  model: deepseek-chat

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

  global-config:
    db-config:
      id-type: auto
